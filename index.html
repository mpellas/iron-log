function resizeImage(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=()=>rej(new Error("Read failed"));
    reader.onload=(e)=>{
      const img=new Image();
      img.onerror=()=>rej(new Error("Image load failed"));
      img.onload=()=>{
        const scale=Math.min(1,1024/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        res(canvas.toDataURL("image/jpeg",0.82).split(",")[1]);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function ApiKeyModal({onSave}){
  const [val,setVal]=useState("");
  return(
    <div className="key-modal-overlay">
      <div className="key-modal">
        <div className="key-modal-title">IRON LOG</div>
        <div className="key-modal-desc">Paste your Anthropic API key to enable AI features. Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. Stored only on this device.</div>
        <input className="key-input" type="password" placeholder="sk-ant-..." value={val} onChange={e=>setVal(e.target.value)}/>
        <button className="btn btn-accent" style={{width:"100%",padding:14}} onClick={()=>val.trim()&&onSave(val.trim())}>SAVE &amp; START</button>
        <div className="key-note">KEY STORED LOCALLY · NEVER SENT ANYWHERE EXCEPT ANTHROPIC API</div>
      </div>
    </div>
  );
}

function RestTimer({seconds}){
  const [timeLeft,setTimeLeft]=useState(null);
  const [running,setRunning]=useState(false);
  const ref=useRef(null);
  const start=()=>{setTimeLeft(seconds);setRunning(true);};
  useEffect(()=>{
    if(running&&timeLeft>0){ref.current=setTimeout(()=>setTimeLeft(t=>t-1),1000);}
    else if(timeLeft===0){setRunning(false);}
    return()=>clearTimeout(ref.current);
  },[running,timeLeft]);
  const mins=Math.floor((timeLeft||0)/60);
  const secs=((timeLeft||0)%60).toString().padStart(2,"0");
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,marginBottom:10,marginTop:2}}>
      <span style={{fontFamily:"IBM Plex Mono",fontSize:9,color:"var(--muted)",letterSpacing:1,textTransform:"uppercase",flex:1}}>REST {seconds}s between supersets</span>
      {timeLeft===null&&<button className="btn btn-ghost" style={{padding:"4px 12px",fontSize:10}} onClick={start}>START REST</button>}
      {timeLeft!==null&&timeLeft>0&&<span style={{fontFamily:"Bebas Neue",fontSize:22,color:"var(--accent)",letterSpacing:2}}>{mins}:{secs}</span>}
      {timeLeft===0&&<span style={{fontFamily:"IBM Plex Mono",fontSize:10,color:"var(--accent)",letterSpacing:1}}>GO! &#x2713;</span>}
      {timeLeft!==null&&<button className="btn btn-ghost" style={{padding:"4px 10px",fontSize:10}} onClick={()=>{setTimeLeft(null);setRunning(false);}}>&#x21ba;</button>}
    </div>
  );
}

function ProgressChart({data,valueKey,color,label,unit=""}){
  if(!data.length)return null;
  const vals=data.map(d=>d[valueKey]);
  const max=Math.max(...vals),min=Math.min(...vals),range=max-min||1;
  const W=320,H=120,P={top:10,right:10,bottom:24,left:44};
  const cW=W-P.left-P.right,cH=H-P.top-P.bottom;
  const pts=data.map((d,i)=>({x:P.left+(i/Math.max(data.length-1,1))*cW,y:P.top+(1-(d[valueKey]-min)/range)*cH}));
  const polyline=pts.map(p=>`${p.x},${p.y}`).join(" ");
  const area=`M${pts[0].x},${P.top+cH} `+pts.map(p=>`L${p.x},${p.y}`).join(" ")+` L${pts[pts.length-1].x},${P.top+cH} Z`;
  const yTicks=[min,(min+max)/2,max].map(v=>({y:P.top+(1-(v-min)/range)*cH,label:Math.round(v)+unit}));
  const xIdxs=[0,Math.floor((data.length-1)/2),data.length-1].filter((v,i,a)=>a.indexOf(v)===i&&v<data.length);
  return(
    <div className="chart-wrap">
      <div className="chart-title">{label}</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",overflow:"visible"}}>
        {yTicks.map((t,i)=>(<g key={i}><line x1={P.left} x2={P.left+cW} y1={t.y} y2={t.y} stroke="var(--border)" strokeWidth="1"/><text x={P.left-4} y={t.y+4} textAnchor="end" fill="var(--muted)" fontSize="8" fontFamily="IBM Plex Mono,monospace">{t.label}</text></g>))}
        {xIdxs.map(i=>(<text key={i} x={pts[i].x} y={H-4} textAnchor="middle" fill="var(--muted)" fontSize="8" fontFamily="IBM Plex Mono,monospace">{data[i].shortDate}</text>))}
        <path d={area} fill={color} opacity="0.08"/>
        <polyline points={polyline} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color} stroke="var(--bg)" strokeWidth="1.5"/>)}
      </svg>
    </div>
  );
}

function ProgressTab({history}){
  const exerciseSet=new Set();
  history.forEach(w=>w.exercises.forEach(e=>{if(e.muscle!=="Cardio")exerciseSet.add(e.name);}));
  const allExercises=[...exerciseSet].sort();
  const [selected,setSelected]=useState(allExercises[0]||"");
  useEffect(()=>{if(allExercises.length&&!allExercises.includes(selected))setSelected(allExercises[0]);},[history.length]);
  if(!allExercises.length)return(<div className="section"><div className="empty-state"><span style={{fontSize:36,display:"block",marginBottom:12,opacity:0.3}}>&#x1F4C8;</span>Log some workouts first<br/>and your progress will appear here.</div></div>);
  const isUni=UNILATERAL_EXERCISES.has(selected);
  const dataPoints=[];
  [...history].reverse().forEach(w=>{
    const ex=w.exercises.find(e=>e.name===selected);
    if(!ex)return;
    if(isUni){
      const valid=ex.sets.filter(s=>s.weightL||s.weightR);
      if(!valid.length)return;
      const maxWeightL=Math.max(0,...valid.map(s=>Number(s.weightL||0)));
      const maxWeightR=Math.max(0,...valid.map(s=>Number(s.weightR||0)));
      const maxWeight=Math.max(maxWeightL,maxWeightR);
      const volume=valid.reduce((sum,s)=>sum+(Number(s.weightL||0)*Number(s.repsL||0))+(Number(s.weightR||0)*Number(s.repsR||0)),0);
      const totalReps=valid.reduce((sum,s)=>sum+Number(s.repsL||0)+Number(s.repsR||0),0);
      const shortDate=new Date(w.dateKey).toLocaleDateString("en-US",{month:"numeric",day:"numeric"});
      dataPoints.push({date:w.date,shortDate,volume,maxWeight,maxWeightL,maxWeightR,totalReps,sets:valid.length});
    }else{
      const valid=ex.sets.filter(s=>s.weight&&s.reps);
      if(!valid.length)return;
      const volume=valid.reduce((s,x)=>s+Number(x.weight)*Number(x.reps),0);
      const maxWeight=Math.max(...valid.map(s=>Number(s.weight)));
      const totalReps=valid.reduce((s,x)=>s+Number(x.reps),0);
      const shortDate=new Date(w.dateKey).toLocaleDateString("en-US",{month:"numeric",day:"numeric"});
      dataPoints.push({date:w.date,shortDate,volume,maxWeight,totalReps,sets:valid.length});
    }
  });
  const hasData=dataPoints.length>0;
  const latest=dataPoints[dataPoints.length-1];
  const previous=dataPoints[dataPoints.length-2];
  const weightDelta=latest&&previous?latest.maxWeight-previous.maxWeight:null;
  const bestWeight=hasData?Math.max(...dataPoints.map(d=>d.maxWeight)):0;
  return(
    <div className="section">
      <div className="section-label">Exercise Progress</div>
      <div style={{marginBottom:20}}><select className="input" value={selected} onChange={e=>setSelected(e.target.value)}>{allExercises.map(ex=><option key={ex}>{ex}</option>)}</select></div>
      {!hasData&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--muted)",fontFamily:"IBM Plex Mono",fontSize:12}}>No logged sets with weight for this exercise yet.</div>}
      {hasData&&(
        <>
          {isUni&&latest?.maxWeightL!==undefined&&(
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:6,padding:"10px 14px",marginBottom:12}}>
              <div style={{fontFamily:"IBM Plex Mono",fontSize:9,color:"var(--muted)",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Latest &#x2014; Left vs Right</div>
              <div style={{display:"flex",gap:16,alignItems:"center"}}>
                <div><div style={{fontFamily:"Bebas Neue",fontSize:26,color:"var(--accent)"}}>{latest.maxWeightL}lb</div><div style={{fontFamily:"IBM Plex Mono",fontSize:9,color:"var(--muted)"}}>LEFT</div></div>
                <div style={{fontFamily:"IBM Plex Mono",fontSize:18,color:"var(--border)"}}>/</div>
                <div><div style={{fontFamily:"Bebas Neue",fontSize:26,color:"var(--muted)"}}>{latest.maxWeightR}lb</div><div style={{fontFamily:"IBM Plex Mono",fontSize:9,color:"var(--muted)"}}>RIGHT</div></div>
                {latest.maxWeightL&&latest.maxWeightR&&(
                  <div style={{marginLeft:"auto",textAlign:"right"}}>
                    <div style={{fontFamily:"Bebas Neue",fontSize:18,color:latest.maxWeightL>=latest.maxWeightR?"var(--accent)":"var(--accent2)"}}>
                      {latest.maxWeightL>=latest.maxWeightR?"BALANCED":`${latest.maxWeightR-latest.maxWeightL}lb GAP`}
                    </div>
                    <div style={{fontFamily:"IBM Plex Mono",fontSize:9,color:"var(--muted)"}}>L vs R</div>
                  </div>
                )}
              </div>
            </div>
          )}
          <div className="prog-stats">
            <div className="prog-stat"><div className="prog-stat-val">{bestWeight}<span style={{fontSize:12}}>lb</span></div><div className="prog-stat-lbl">Best Weight</div></div>
            <div className="prog-stat"><div className="prog-stat-val">{dataPoints.length}</div><div className="prog-stat-lbl">Sessions</div></div>
            <div className="prog-stat">
              <div className="prog-stat-val" style={{color:weightDelta===null?"var(--accent)":weightDelta>0?"var(--accent)":weightDelta<0?"var(--danger)":"var(--muted)",fontSize:18,paddingTop:4}}>
                {weightDelta===null?"&#x2013;":weightDelta>0?`+${weightDelta}`:weightDelta===0?"=":weightDelta}<span style={{fontSize:10}}>lb</span>
              </div>
              <div className="prog-stat-lbl">vs Last</div>
            </div>
          </div>
          {dataPoints.length>=2&&<ProgressChart data={dataPoints} valueKey="maxWeight" color="var(--accent)" label="Peak Weight Per Session (lb)" unit="lb"/>}
          {dataPoints.length>=2&&<ProgressChart data={dataPoints} valueKey="volume" color="var(--accent2)" label="Total Volume Per Session (lb x reps)"/>}
          {dataPoints.length===1&&<div className="prog-note">Log this exercise again to see your trend.</div>}
          <div className="section-label" style={{marginTop:8}}>Session History</div>
          {[...dataPoints].reverse().map((d,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
              <div>
                <div style={{fontFamily:"IBM Plex Mono",fontSize:11,color:"var(--text)"}}>{d.shortDate}</div>
                <div style={{fontFamily:"IBM Plex Mono",fontSize:10,color:"var(--muted)",marginTop:2}}>{d.sets} sets &middot; {d.totalReps} total reps</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"Bebas Neue",fontSize:18,color:"var(--accent)",letterSpacing:1}}>{d.maxWeight}lb</div>
                <div style={{fontFamily:"IBM Plex Mono",fontSize:9,color:"var(--muted)"}}>vol {Math.round(d.volume).toLocaleString()}</div>
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

    return{
      id:generateId(),name:ex.name,muscle:ex.muscle,
      aiWeight:sw,aiReps:sr,superset,supersetLabel,restSeconds,
      sets:Array.from({length:ex.sets||3},()=>isUni
        ?{id:generateId(),weightL:sw,weightR:sw,repsL:sr,repsR:sr}
        :{id:generateId(),weight:sw,reps:sr}
      )
    };
  };

  const loadPlanIntoLog=()=>{
    if(!aiPlan)return;
    let loaded=[];
    if(aiPlan.supersets?.length){
      aiPlan.supersets.forEach(ss=>{
        if(ss.a)loaded.push(parseEx(ss.a,ss.pair,"A",null));
        if(ss.b)loaded.push(parseEx(ss.b,ss.pair,"B",ss.restSeconds));
      });
      if(aiPlan.finisher?.exercises?.length){
        aiPlan.finisher.exercises.forEach(ex=>loaded.push(parseEx(ex,"finisher","F",null)));
      }
    }else if(aiPlan.exercises?.length){
      loaded=aiPlan.exercises.map(ex=>parseEx(ex,null,null,null));
    }
    if(!loaded.length)return;
    setExercises(loaded);setLoadedFromAI(true);setTab("log");
  };

  const handlePhotoScan=async(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    e.target.value="";
    if(!apiKey){setShowKeyModal(true);return;}
    setScanLoading(true);setScanResult(null);
    try{
      const base64=await resizeImage(file);
      const exerciseList=Object.entries(EXERCISE_LIBRARY).map(([m,exs])=>`${m}: ${exs.join(", ")}`).join("\n");
      const prompt=`Identify the gym equipment in the photo and map to this list:\n${exerciseList}\n\nRespond ONLY with JSON:\n{"identified":"short name","muscle":"exact muscle group","exercise":"exact exercise name","confidence":"high|medium|low","note":"max 10 words"}\n\nIf no gym equipment: {"identified":null,"muscle":null,"exercise":null,"confidence":"low","note":"Could not identify gym equipment."}`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:apiHeaders(),
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,
          messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:base64}},{type:"text",text:prompt}]}]})});
      const data=await res.json();
      if(data.error){setScanResult({identified:null,note:data.error.message||"API error."});setScanLoading(false);return;}
      const parsed=JSON.parse((data.content?.map(b=>b.text||"").join("")||"{}").replace(/```json|```/g,"").trim());
      if(parsed.muscle&&parsed.exercise&&EXERCISE_LIBRARY[parsed.muscle]){setSelectedMuscle(parsed.muscle);setSelectedExercise(parsed.exercise);setScanResult(parsed);}
      else{setScanResult({identified:null,note:parsed.note||"Could not identify gym equipment."});}
    }catch(err){setScanResult({identified:null,note:`Scan failed: ${err.message}`});}
    setScanLoading(false);
  };

  const getAiRecommendation=async()=>{
    if(!apiKey){setShowKeyModal(true);return;}
    setAiLoading(true);setAiPlan(null);setTab("ai");
    const exerciseList=Object.entries(EXERCISE_LIBRARY).map(([m,exs])=>`${m}: ${exs.join(", ")}`).join("\n");

    const exerciseHistory={};
    [...history].reverse().forEach(w=>{
      w.exercises.forEach(e=>{
        if(!exerciseHistory[e.name])exerciseHistory[e.name]=[];
        const valid=e.sets.filter(s=>s.weight&&s.reps);
        if(valid.length){
          const maxWeight=Math.max(...valid.map(s=>Number(s.weight)));
          const totalSets=valid.length;
          const avgReps=Math.round(valid.reduce((sum,s)=>sum+Number(s.reps),0)/totalSets);
          exerciseHistory[e.name].push({date:w.dateKey,maxWeight,totalSets,avgReps});
        }
      });
    });
    const progressionSummary=Object.entries(exerciseHistory).map(([name,sessions])=>{
      const recent=sessions.slice(-3);
      const trend=recent.map(s=>`${s.date}: ${s.totalSets}x${s.avgReps} @ ${s.maxWeight}lb`).join(" -> ");
      const latest=recent[recent.length-1];
      const suggested=latest?Math.min(75,latest.maxWeight+5):null;
      return `${name}: ${trend}${suggested?` [suggest ~${suggested}lb]`:""}`;
    }).join("\n");

    const recentSummary=history.slice(0,7).map(w=>{
      const muscles=[...new Set(w.exercises.map(e=>e.muscle))].join(", ");
      const exNames=w.exercises.map(e=>{
        const top=e.sets.filter(s=>s.weight&&s.reps).sort((a,b)=>Number(b.weight)-Number(a.weight))[0];
        return top?`${e.name} (${top.weight}lbx${top.reps})`:e.name;
      }).join(", ");
      return `${w.date}: ${muscles} - ${exNames}`;
    }).join("\n");

    const userContext=`IMPORTANT USER CONTEXT:
- Planet Fitness with TWO barbell areas, Smith machines, dumbbells up to 75lb, full cable stations, all standard machines.
- User has RIGHT SIDE DOMINANCE causing left-side strength imbalance.
- PRIORITIZE unilateral exercises for Back and Chest: Single-Arm Dumbbell Row, Single-Arm Cable Row, Single-Arm Cable Fly, Single-Arm Dumbbell Press.
- For bilateral exercises tip should say: start with LEFT side first, match on right.
- Dumbbells max 75lb. Regularly include left-side isolation to build balance.`;

    const supersetRules=`BUILD A SUPERSET-BASED WORKOUT:
SUPERSETS (5 pairs - A then B back-to-back no rest, then rest between pairs):
- Pair opposing or complementary muscle groups
- MUST include at least 2 leg exercises across the supersets
- MUST include at least 1 core exercise
- Use progression data to suggest specific weights. Suggest 2.5-5lb increases where user completed all reps cleanly
- Dumbbells max 75lb. For unilateral exercises left and right are logged separately

FINISHER (10-min circuit to spike heart rate):
- 3-4 exercises back-to-back with minimal rest
- Use cardio machines or bodyweight available at Planet Fitness

Respond ONLY with valid JSON in this exact format (no other text):
{"focus":"e.g. Push/Pull Day","rationale":"1-2 sentences why","supersets":[{"pair":1,"restSeconds":75,"a":{"name":"exact name from list","muscle":"exact group","sets":3,"reps":"8-12","weight":"e.g. 135lb","tip":"coaching tip with weight rationale"},"b":{"name":"exact name from list","muscle":"exact group","sets":3,"reps":"8-12","weight":"e.g. 45lb","tip":"coaching tip"}}],"finisher":{"name":"10-Min Finisher","exercises":[{"name":"exact name from list","muscle":"exact group","duration":"40 sec","rest":"20 sec","tip":"tip"}]}}`;

    const prompt=history.length===0
      ?`User just started at Planet Fitness. Build a beginner full-body superset workout.\n${userContext}\nAvailable exercises (ONLY these exact names):\n${exerciseList}\n\n${supersetRules}`
      :`Planet Fitness gym. Recent workouts:\n${recentSummary}\n\nEXERCISE PROGRESSION DATA:\n${progressionSummary}\n\n${userContext}\n\nAvailable exercises (ONLY these exact names):\n${exerciseList}\n\n${supersetRules}`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:apiHeaders(),
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2048,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(data.error){setAiPlan({focus:"API Error",rationale:data.error.message||"API error. Check your key.",supersets:[]});setAiLoading(false);return;}
      const rawText=data.content?.map(b=>b.text||"").join("")||"";
      const jsonMatch=rawText.match(/\{[\s\S]*\}/);
      if(!jsonMatch){setAiPlan({focus:"Parse Error",rationale:"Could not read AI response. Try again.",supersets:[]});setAiLoading(false);return;}
      const parsed=JSON.parse(jsonMatch[0]);
      setAiPlan(parsed);
    }catch(err){setAiPlan({focus:"Error",rationale:`Something went wrong: ${err.message}. Please try again.`,supersets:[]});}
    setAiLoading(false);
  };

  const totalWorkouts=history.length;
  const muscleCount={};
  history.forEach(w=>w.exercises.forEach(e=>{muscleCount[e.muscle]=(muscleCount[e.muscle]||0)+1;}));
  const topMuscle=Object.entries(muscleCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||"&#x2013;";

  return(
    <>
      <style>{css}</style>
      {(!apiKey||showKeyModal)&&<ApiKeyModal onSave={handleSaveKey}/>}
      <div className="app">
        <div className="header">
          <div className="header-top">
            <div className="logo">IRON LOG</div>
            <div className="logo-sub">Workout Tracker</div>
            <button className="header-key" title="Update API Key" onClick={()=>setShowKeyModal(true)}>&#x2699;</button>
          </div>
          <div className="date-badge">{today()}</div>
        </div>

        <div className="nav">
          {[["log","LOG"],["history","HISTORY"],["progress","GAINS"],["ai","AI REC"]].map(([id,label])=>(
            <button key={id} className={`nav-btn ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{label}</button>
          ))}
        </div>

        {tab==="log"&&(
          <div className="section">
            {loadedFromAI&&exercises.length>0&&<div className="ai-badge">&#x1F916; AI Plan loaded &#x2014; tap SWAP if a machine is taken</div>}
            {!loadedFromAI&&(
              <>
                <div className="section-label">Add Exercise</div>
                <label className="scan-btn" style={{cursor:scanLoading?"not-allowed":"pointer",opacity:scanLoading?0.4:1}}>
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoScan} disabled={scanLoading}/>
                  &#x1F4F7; <span>SCAN MACHINE</span>
                </label>
                {scanLoading&&<div className="scan-loading"><div className="scan-spinner"/><div className="scan-loading-text">IDENTIFYING EQUIPMENT...</div></div>}
                {scanResult&&!scanLoading&&(
                  <div className="scan-result">
                    <div className="scan-result-icon">{scanResult.identified?"✅":"❓"}</div>
                    <div className="scan-result-body">
                      {scanResult.identified
                        ?<><div className="scan-result-label">Identified</div><div className="scan-result-text">{scanResult.identified} &#x2192; {scanResult.exercise}</div><div className="scan-result-sub">{scanResult.note}</div></>
                        :<><div className="scan-result-label">Not Recognized</div><div className="scan-result-text" style={{color:"var(--muted)"}}>{scanResult.note}</div></>
                      }
                    </div>
                    <button className="scan-dismiss" onClick={()=>setScanResult(null)}>&#xd7;</button>
                  </div>
                )}
                <div className="row" style={{marginBottom:8}}>
                  <select className="input" value={selectedMuscle} onChange={e=>{setSelectedMuscle(e.target.value);setSelectedExercise(EXERCISE_LIBRARY[e.target.value][0]);setScanResult(null);}}>
                    {MUSCLE_GROUPS.map(m=><option key={m}>{m}</option>)}
                  </select>
                </div>
                <div className="row" style={{marginBottom:12}}>
                  <select className="input" value={selectedExercise} onChange={e=>{setSelectedExercise(e.target.value);setScanResult(null);}}>
                    {EXERCISE_LIBRARY[selectedMuscle].map(ex=><option key={ex}>{ex}</option>)}
                  </select>
                  <button className="btn btn-accent" onClick={addExercise}>ADD</button>
                </div>
              </>
            )}
            {exercises.length>0&&(
              <>
                {!loadedFromAI&&<hr className="divider"/>}
                <div className="section-label">{loadedFromAI?"Today's Plan":"Today's Session"}</div>
                {exercises.map((ex,i)=>{
                  const prevEx=exercises[i-1];
                  const isNewGroup=!prevEx||prevEx.superset!==ex.superset;
                  const isFinisher=ex.superset==="finisher";
                  return(
                    <div key={ex.id}>
                      {isNewGroup&&ex.superset&&!isFinisher&&(
                        <div style={{fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:3,color:"var(--accent)",textTransform:"uppercase",margin:"14px 0 6px",display:"flex",alignItems:"center",gap:8}}>
                          <span>Superset {ex.superset}</span>
                          <span style={{flex:1,borderTop:"1px solid var(--border)"}}/>
                          <span style={{color:"var(--muted)"}}>A then B, no rest between</span>
                        </div>
                      )}
                      {isNewGroup&&isFinisher&&(
                        <div style={{fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:3,color:"var(--accent2)",textTransform:"uppercase",margin:"14px 0 6px",display:"flex",alignItems:"center",gap:8}}>
                          <span>&#x1F525; FINISHER</span>
                          <span style={{flex:1,borderTop:"1px solid var(--border)"}}/>
                          <span style={{color:"var(--muted)"}}>spike your heart rate</span>
                        </div>
                      )}
                      {ex.superset&&!isFinisher&&(
                        <div style={{fontFamily:"Bebas Neue",fontSize:12,color:ex.supersetLabel==="A"?"var(--accent)":"var(--muted)",letterSpacing:2,marginBottom:3}}>
                          {ex.supersetLabel==="A"?"A &#x2014; DO FIRST":"B &#x2014; DO SECOND"}
                        </div>
                      )}
                      <ExerciseCard exercise={ex} onChange={u=>updateExercise(ex.id,u)} onRemove={()=>removeExercise(ex.id)} allowSwap={loadedFromAI}/>
                      {ex.supersetLabel==="B"&&ex.restSeconds&&<RestTimer seconds={ex.restSeconds}/>}
                    </div>
                  );
                })}
                {loadedFromAI&&<button className="btn btn-ghost" style={{width:"100%",marginBottom:10}} onClick={()=>setLoadedFromAI(false)}>+ Add another exercise manually</button>}
                <div style={{marginBottom:10}}><textarea className="note-input" rows={2} placeholder="Session notes (optional)..." value={note} onChange={e=>setNote(e.target.value)}/></div>
                <button className="btn btn-accent" style={{width:"100%",padding:14}} onClick={saveWorkout}>SAVE WORKOUT</button>
              </>
            )}
            {exercises.length===0&&!scanLoading&&!scanResult&&(
              <div className="empty-state"><span className="empty-icon">&#x1F3CB;</span>Snap a photo to auto-fill, select manually above,<br/>or get an AI plan from the AI REC tab.</div>
            )}
          </div>
        )}

        {tab==="history"&&(
          <div className="section">
            <div className="stat-row">
              <div className="stat-box"><div className="stat-val">{totalWorkouts}</div><div className="stat-lbl">Workouts</div></div>
              <div className="stat-box"><div className="stat-val">{Object.keys(muscleCount).length}</div><div className="stat-lbl">Muscles</div></div>
              <div className="stat-box"><div className="stat-val" style={{fontSize:16,paddingTop:6}}>{topMuscle}</div><div className="stat-lbl">Top Focus</div></div>
            </div>
            {history.length===0
              ?<div className="empty-state"><span className="empty-icon">&#x1F4CB;</span>No workouts logged yet.<br/>Head to LOG to start.</div>
              :history.map(entry=><HistoryItem key={entry.id} entry={entry}/>)
            }
          </div>
        )}

        {tab==="progress"&&<ProgressTab history={history}/>}

        {tab==="ai"&&(
          <div className="section">
            <div className="section-label">AI Recommendation</div>
            <button className="btn btn-accent" style={{width:"100%",padding:14,marginBottom:16}} onClick={getAiRecommendation} disabled={aiLoading}>
              {aiLoading?"ANALYZING...":"BUILD MY NEXT WORKOUT"}
            </button>
            {aiLoading&&(
              <div className="ai-panel">
                <div className="ai-label"><div className="ai-dot"/> ANALYZING YOUR HISTORY</div>
                <div className="ai-skeleton">{[80,100,60,90,70,85].map((w,i)=><div key={i} className="skeleton-line" style={{width:`${w}%`,animationDelay:`${i*0.1}s`}}/>)}</div>
              </div>
            )}
            {aiPlan&&!aiLoading&&(
              <>
                <div className="ai-panel">
                  <div className="ai-label"><div className="ai-dot"/> PLAN READY</div>
                  <div className="plan-focus">{aiPlan.focus}</div>
                  <div style={{fontFamily:"IBM Plex Sans",fontSize:13,color:"var(--muted)",lineHeight:1.5}}>{aiPlan.rationale}</div>
                </div>

                {aiPlan.supersets?.map((ss,i)=>(
                  <div key={i} style={{marginBottom:14}}>
                    <div style={{fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:3,color:"var(--accent)",textTransform:"uppercase",marginBottom:6}}>
                      Superset {ss.pair} &#x2014; A then B, no rest between
                    </div>
                    <div className="plan-exercise" style={{borderLeft:"3px solid var(--accent)",marginBottom:4}}>
                      <div className="plan-ex-header">
                        <div>
                          <span style={{fontFamily:"Bebas Neue",fontSize:14,color:"var(--accent)",marginRight:6}}>A</span>
                          <span className="plan-ex-name">{ss.a?.name}</span>
                          <div className="plan-ex-muscle" style={{marginLeft:20}}>{ss.a?.muscle}</div>
                        </div>
                        <div className="plan-ex-detail">{ss.a?.sets}x{ss.a?.reps}{ss.a?.weight?` @ ${ss.a.weight}`:""}</div>
                      </div>
                      {ss.a?.tip&&<div className="plan-rationale">{ss.a.tip}</div>}
                    </div>
                    <div className="plan-exercise" style={{borderLeft:"3px solid var(--muted)",marginBottom:4}}>
                      <div className="plan-ex-header">
                        <div>
                          <span style={{fontFamily:"Bebas Neue",fontSize:14,color:"var(--muted)",marginRight:6}}>B</span>
                          <span className="plan-ex-name">{ss.b?.name}</span>
                          <div className="plan-ex-muscle" style={{marginLeft:20}}>{ss.b?.muscle}</div>
                        </div>
                        <div className="plan-ex-detail">{ss.b?.sets}x{ss.b?.reps}{ss.b?.weight?` @ ${ss.b.weight}`:""}</div>
                      </div>
                      {ss.b?.tip&&<div className="plan-rationale">{ss.b.tip}</div>}
                    </div>
                    <div style={{fontFamily:"IBM Plex Mono",fontSize:9,color:"var(--muted)",letterSpacing:1,padding:"6px 10px",background:"var(--surface2)",borderRadius:4,textAlign:"center"}}>
                      &#x23F1; REST {ss.restSeconds||75}s after completing both exercises
                    </div>
                  </div>
                ))}

                {aiPlan.finisher?.exercises?.length>0&&(
                  <div style={{marginBottom:14}}>
                    <div style={{fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:3,color:"var(--accent2)",textTransform:"uppercase",marginBottom:6}}>
                      &#x1F525; {aiPlan.finisher.name||"10-Min Finisher"} &#x2014; spike your heart rate
                    </div>
                    {aiPlan.finisher.exercises.map((ex,i)=>(
                      <div key={i} className="plan-exercise" style={{borderLeft:"3px solid var(--accent2)",marginBottom:4}}>
                        <div className="plan-ex-header">
                          <div><div className="plan-ex-name">{ex.name}</div><div className="plan-ex-muscle">{ex.muscle}</div></div>
                          <div className="plan-ex-detail">{ex.duration}{ex.rest?` / ${ex.rest} rest`:""}</div>
                        </div>
                        {ex.tip&&<div className="plan-rationale">{ex.tip}</div>}
                      </div>
                    ))}
                  </div>
                )}

                {!aiPlan.supersets&&(aiPlan.exercises||[]).map((ex,i)=>(
                  <div key={i} className="plan-exercise">
                    <div className="plan-ex-header">
                      <div><div className="plan-ex-name">{ex.name}</div><div className="plan-ex-muscle">{ex.muscle}</div></div>
                      <div className="plan-ex-detail">{ex.sets}x{ex.reps}{ex.weight?` @ ${ex.weight}`:""}</div>
                    </div>
                    {ex.tip&&<div className="plan-rationale">{ex.tip}</div>}
                  </div>
                ))}

                {(aiPlan.supersets?.length>0||aiPlan.exercises?.length>0)&&(
                  <button className="load-workout-btn" onClick={loadPlanIntoLog}>START THIS WORKOUT &#x2192;</button>
                )}

                {!aiPlan.supersets&&!aiPlan.exercises?.length&&(
                  <div style={{fontFamily:"IBM Plex Mono",fontSize:11,color:"var(--danger)",padding:"12px 0"}}>No exercises returned. Try tapping BUILD MY NEXT WORKOUT again.</div>
                )}
              </>
            )}
            {!aiPlan&&!aiLoading&&(
              <div className="empty-state"><span className="empty-icon">&#x1F916;</span>Claude will analyze your history and build<br/>a superset-based Planet Fitness workout plan.</div>
            )}
          </div>
        )}
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<GymTracker/>);
</script>
</body>
</html>
