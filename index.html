    function loadHistory() {
      try { return JSON.parse(localStorage.getItem("ironlog:history") || "[]"); }
      catch { return []; }
    }
    function saveHistory(h) {
      try { localStorage.setItem("ironlog:history", JSON.stringify(h)); } catch(e) {}
    }
    function loadApiKey() { return localStorage.getItem("ironlog:apikey") || ""; }
    function saveApiKey(k) { localStorage.setItem("ironlog:apikey", k); }

    function generateId() { return Math.random().toString(36).slice(2, 10); }

    function todayKey() { return new Date().toISOString().slice(0, 10); }
    // Resize image to max 1024px and compress to JPEG before sending to API
    function resizeAndEncode(file, maxSize=1024, quality=0.82) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onerror = () => rej(new Error("Read failed"));
        reader.onload = (e) => {
          const img = new Image();
          img.onerror = () => rej(new Error("Image load failed"));
          img.onload = () => {
            const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL("image/jpeg", quality);
            res(dataUrl.split(",")[1]);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── API Key Modal ─────────────────────────────────────────────────────────

              Your key is stored only on this device.

            <input
              className="key-input"

              placeholder="sk-ant-..."
              value={val}
              onChange={e => setVal(e.target.value)}

            <button className="btn btn-accent" style={{width:"100%",padding:14}}
              onClick={() => val.trim() && onSave(val.trim())}>

            <span className="set-label">×</span>
            <input className="set-input" type="number" inputMode="decimal" placeholder="reps" value={set.reps || ""}

          </div>

        <div className="set-row">
          <input className="set-input" type="number" inputMode="decimal" placeholder="lbs" value={set.weight || ""}

          <span className="set-label">×</span>
          <input className="set-input" type="number" inputMode="decimal" placeholder="reps" value={set.reps || ""}

    // ── ExerciseCard ──────────────────────────────────────────────────────────

        : { id: generateId(), weight: "", reps: "" };
      const addSet = () => onChange({ ...exercise, sets: [...exercise.sets, blankSet()] });
      const updateSet = (id, u) => onChange({ ...exercise, sets: exercise.sets.map(s => s.id === id ? u : s) });
      const removeSet = (id) => onChange({ ...exercise, sets: exercise.sets.filter(s => s.id !== id) });
      const swapTo = (newEx) => { onChange({ ...exercise, name: newEx }); setSwapOpen(false); };
      const alternatives = EXERCISE_LIBRARY[exercise.muscle] || [];

        <div className="exercise-card">

              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div className="exercise-meta">
                  {exercise.muscle}{isCardio ? " · duration + resistance" : ""}

                  <span style={{fontFamily:"IBM Plex Mono",fontSize:8,letterSpacing:2,color:"#0a0a0a",background:"var(--accent)",borderRadius:3,padding:"1px 5px"}}>BODYWEIGHT</span>

              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>

                <button className="btn-swap" onClick={() => setSwapOpen(o => !o)}>

          {exercise.aiWeight && (

    // ── Progress Chart ────────────────────────────────────────────────────────
    function ProgressChart({ data, valueKey, color, label, unit="" }) {
      if (!data.length) return null;
      const vals = data.map(d => d[valueKey]);
      const max = Math.max(...vals), min = Math.min(...vals);
      const range = max - min || 1;
      const W=320, H=120, P={top:10,right:10,bottom:24,left:44};
      const cW=W-P.left-P.right, cH=H-P.top-P.bottom;
      const pts = data.map((d,i) => ({
        x: P.left + (i/Math.max(data.length-1,1))*cW,
        y: P.top + (1-(d[valueKey]-min)/range)*cH,
        val: d[valueKey], date: d.shortDate,
      }));
      const polyline = pts.map(p=>`${p.x},${p.y}`).join(" ");
      const area = `M${pts[0].x},${P.top+cH} `+pts.map(p=>`L${p.x},${p.y}`).join(" ")+` L${pts[pts.length-1].x},${P.top+cH} Z`;
      const yTicks = [min,(min+max)/2,max].map(v=>({y:P.top+(1-(v-min)/range)*cH,label:Math.round(v)+unit}));
      const xIdxs = [0,Math.floor((data.length-1)/2),data.length-1].filter((v,i,a)=>a.indexOf(v)===i&&v<data.length);
      return (
        <div className="chart-wrap">
          <div className="chart-title">{label}</div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",overflow:"visible"}}>
            {yTicks.map((t,i)=>(
              <g key={i}>
                <line x1={P.left} x2={P.left+cW} y1={t.y} y2={t.y} stroke="var(--border)" strokeWidth="1"/>
                <text x={P.left-4} y={t.y+4} textAnchor="end" fill="var(--muted)" fontSize="8" fontFamily="IBM Plex Mono,monospace">{t.label}</text>
              </g>
            ))}
            {xIdxs.map(i=>(
              <text key={i} x={pts[i].x} y={H-4} textAnchor="middle" fill="var(--muted)" fontSize="8" fontFamily="IBM Plex Mono,monospace">{data[i].shortDate}</text>
            ))}
            <path d={area} fill={color} opacity="0.08"/>
            <polyline points={polyline} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
            {pts.map((p,i)=>(
              <circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color} stroke="var(--bg)" strokeWidth="1.5"/>
            ))}
          </svg>
        </div>
      );
    }

    // ── Progress Tab ──────────────────────────────────────────────────────────
    function ProgressTab({ history }) {
      const exerciseSet = new Set();
      history.forEach(w => w.exercises.forEach(e => { if (e.muscle !== "Cardio") exerciseSet.add(e.name); }));
      const allExercises = [...exerciseSet].sort();
      const [selected, setSelected] = useState(allExercises[0] || "");
      useEffect(() => {
        if (allExercises.length && !allExercises.includes(selected)) setSelected(allExercises[0]);
      }, [history.length]);
      if (!allExercises.length) {
        return (
          <div className="section">
            <div className="prog-empty">
              <span style={{fontSize:36,display:"block",marginBottom:12,opacity:0.3}}>📈</span>
              Log some workouts first<br/>and your progress will appear here.
            </div>
          </div>
        );
      }
      const dataPoints = [];
      [...history].reverse().forEach(w => {
        const ex = w.exercises.find(e => e.name === selected);
        if (!ex) return;
        const valid = ex.sets.filter(s => s.weight && s.reps);
        if (!valid.length) return;
        const volume = valid.reduce((s,x) => s + Number(x.weight)*Number(x.reps), 0);
        const maxWeight = Math.max(...valid.map(s => Number(s.weight)));
        const totalReps = valid.reduce((s,x) => s + Number(x.reps), 0);
        const shortDate = new Date(w.dateKey).toLocaleDateString("en-US",{month:"numeric",day:"numeric"});
        dataPoints.push({ date:w.date, shortDate, volume, maxWeight, totalReps, sets:valid.length });
      });
      const hasData = dataPoints.length > 0;
      const latest = dataPoints[dataPoints.length-1];
      const previous = dataPoints[dataPoints.length-2];
      const weightDelta = latest && previous ? latest.maxWeight - previous.maxWeight : null;
      const bestWeight = hasData ? Math.max(...dataPoints.map(d=>d.maxWeight)) : 0;
      return (
        <div className="section">
          <div className="section-label">Exercise Progress</div>
          <div className="prog-select-wrap">
            <select className="input" value={selected} onChange={e => setSelected(e.target.value)}>
              {allExercises.map(ex => <option key={ex}>{ex}</option>)}
            </select>
          </div>
          {!hasData && <div className="prog-empty">No logged sets with weight + reps for this exercise yet.</div>}
          {hasData && (
            <>
              <div className="prog-stats">
                <div className="prog-stat">
                  <div className="prog-stat-val">{bestWeight}<span style={{fontSize:12}}>lb</span></div>
                  <div className="prog-stat-lbl">Best Weight</div>
                </div>
                <div className="prog-stat">
                  <div className="prog-stat-val">{dataPoints.length}</div>
                  <div className="prog-stat-lbl">Sessions</div>
                </div>
                <div className="prog-stat">
                  <div className="prog-stat-val" style={{
                    color: weightDelta===null ? "var(--accent)" : weightDelta>0 ? "var(--accent)" : weightDelta<0 ? "var(--danger)" : "var(--muted)",
                    fontSize:18,paddingTop:4
                  }}>
                    {weightDelta===null ? "–" : weightDelta>0 ? `+${weightDelta}` : weightDelta===0 ? "=" : weightDelta}
                    <span style={{fontSize:10}}>lb</span>
                  </div>
                  <div className="prog-stat-lbl">vs Last</div>
                </div>
              </div>
              {dataPoints.length >= 2 && (
                <ProgressChart data={dataPoints} valueKey="maxWeight" color="var(--accent)" label="Peak Weight Per Session (lb)" unit="lb"/>
              )}
              {dataPoints.length >= 2 && (
                <ProgressChart data={dataPoints} valueKey="volume" color="var(--accent2)" label="Total Volume Per Session (lb × reps)"/>
              )}
              {dataPoints.length === 1 && <div className="prog-note">Log this exercise again to see your trend.</div>}
              <div className="section-label" style={{marginTop:8}}>Session History</div>
              {[...dataPoints].reverse().map((d,i) => (
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                  <div>
                    <div style={{fontFamily:"IBM Plex Mono",fontSize:11,color:"var(--text)"}}>{d.shortDate}</div>
                    <div style={{fontFamily:"IBM Plex Mono",fontSize:10,color:"var(--muted)",marginTop:2}}>{d.sets} sets · {d.totalReps} total reps</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"Bebas Neue",fontSize:18,color:"var(--accent)",letterSpacing:1}}>{d.maxWeight}lb</div>
                    <div style={{fontFamily:"IBM Plex Mono",fontSize:9,color:"var(--muted)"}}>vol {Math.round(d.volume).toLocaleString()}</div>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function GymTracker() {
      const [apiKey, setApiKey] = useState(() => loadApiKey());
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [tab, setTab] = useState("log");
      const [history, setHistory] = useState(() => loadHistory());
      const [exercises, setExercises] = useState([]);
      const [loadedFromAI, setLoadedFromAI] = useState(false);
      const [selectedMuscle, setSelectedMuscle] = useState("Chest");
      const [selectedExercise, setSelectedExercise] = useState(EXERCISE_LIBRARY["Chest"][0]);
      const [note, setNote] = useState("");
      const [aiPlan, setAiPlan] = useState(null);
      const [aiLoading, setAiLoading] = useState(false);
      const [scanLoading, setScanLoading] = useState(false);
      const [scanResult, setScanResult] = useState(null);

      const handleSaveKey = (k) => { saveApiKey(k); setApiKey(k); setShowKeyModal(false); };

      const apiHeaders = () => ({
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      });

      const addExercise = () => {
        setExercises(prev => [...prev, {
          id: generateId(), name: selectedExercise, muscle: selectedMuscle,
          sets: [selectedMuscle === "Cardio"
            ? { id: generateId(), duration: "", resistance: "" }
            : { id: generateId(), weight: "", reps: "" }]
        }]);
        setScanResult(null);
      };
      const updateExercise = (id, u) => setExercises(prev => prev.map(e => e.id === id ? u : e));
      const removeExercise = (id) => setExercises(prev => prev.filter(e => e.id !== id));

      const saveWorkout = () => {
        if (!exercises.length) return;
        const entry = { id: generateId(), date: today(), dateKey: todayKey(), exercises, note, savedAt: Date.now() };
        const updated = [entry, ...history];
        setHistory(updated); saveHistory(updated);
        setExercises([]); setNote(""); setScanResult(null); setLoadedFromAI(false); setTab("history");
      };

      const loadPlanIntoLog = () => {
        if (!aiPlan?.exercises?.length) return;
        const loaded = aiPlan.exercises.map(ex => {
          // Parse suggested weight from AI e.g. "135lb" → "135", "bodyweight" → ""
          const rawWeight = (ex.weight || "").toLowerCase();
          const isBodyweight = rawWeight.includes("body") || rawWeight === "" && BODYWEIGHT_EXERCISES.has(ex.name);
          const weightMatch = rawWeight.match(/(\d+(\.\d+)?)/);
          const suggestedWeight = isBodyweight ? "" : (weightMatch ? weightMatch[1] : "");
          // Parse reps e.g. "8-12" → "8", "10" → "10"
          const repsMatch = (ex.reps || "").toString().match(/(\d+)/);
          const suggestedReps = repsMatch ? repsMatch[1] : "";
          return {
            id: generateId(),
            name: ex.name,
            muscle: ex.muscle,
            aiWeight: suggestedWeight,
            aiReps: suggestedReps,
            sets: Array.from({length: ex.sets||3}, () => ({
              id: generateId(),
              weight: suggestedWeight,
              reps: suggestedReps,
            }))
          };
        });
        setExercises(loaded); setLoadedFromAI(true); setTab("log");
      };

      const handlePhotoScan = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        e.target.value = "";
        if (!apiKey) { setShowKeyModal(true); return; }
        setScanLoading(true); setScanResult(null);
        try {
          const base64 = await resizeAndEncode(file);
          const mediaType = "image/jpeg";
          const exerciseList = Object.entries(EXERCISE_LIBRARY).map(([m,exs])=>`${m}: ${exs.join(", ")}`).join("\n");
          const prompt = `Identify the gym equipment in the photo and map to this list:\n${exerciseList}\n\nRespond ONLY with JSON:\n{"identified":"short name","muscle":"exact muscle group","exercise":"exact exercise name","confidence":"high|medium|low","note":"max 10 words"}\n\nIf no gym equipment: {"identified":null,"muscle":null,"exercise":null,"confidence":"low","note":"Could not identify gym equipment."}`;
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", headers: apiHeaders(),
            body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:300,
              messages:[{role:"user",content:[
                {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
                {type:"text",text:prompt}
              ]}]})
          });
          const data = await res.json();
          const parsed = JSON.parse((data.content?.map(b=>b.text||"").join("")||"{}").replace(/```json|```/g,"").trim());
          if (parsed.muscle && parsed.exercise && EXERCISE_LIBRARY[parsed.muscle]) {
            setSelectedMuscle(parsed.muscle); setSelectedExercise(parsed.exercise); setScanResult(parsed);
          } else { setScanResult({identified:null,note:parsed.note||"Could not identify gym equipment."}); }
        } catch { setScanResult({identified:null,note:"Scan failed. Please try again."}); }
        setScanLoading(false);
      };

      const getAiRecommendation = async () => {
        if (!apiKey) { setShowKeyModal(true); return; }
        setAiLoading(true); setAiPlan(null); setTab("ai");
        const exerciseList = Object.entries(EXERCISE_LIBRARY).map(([m,exs])=>`${m}: ${exs.join(", ")}`).join("\n");
        // Build detailed per-exercise history for AI progression
        const exerciseHistory = {};
        [...history].reverse().forEach(w => {
          w.exercises.forEach(e => {
            if (!exerciseHistory[e.name]) exerciseHistory[e.name] = [];
            const validSets = e.sets.filter(s => s.weight && s.reps);
            if (validSets.length) {
              const maxWeight = Math.max(...validSets.map(s => Number(s.weight)));
              const totalSets = validSets.length;
              const avgReps = Math.round(validSets.reduce((sum,s) => sum + Number(s.reps), 0) / totalSets);
              exerciseHistory[e.name].push({ date: w.dateKey, maxWeight, totalSets, avgReps });
            }
          });
        });
        const progressionSummary = Object.entries(exerciseHistory).map(([name, sessions]) => {
          const recent = sessions.slice(-3);
          const trend = recent.map(s => `${s.date}: ${s.totalSets}x${s.avgReps} @ ${s.maxWeight}lb`).join(' → ');
          const latest = recent[recent.length-1];
          const suggested = latest ? Math.min(75, latest.maxWeight + 5) : null;
          return `${name}: ${trend}${suggested ? ` [suggest ~${suggested}lb]` : ''}`;
        }).join('\n');

        const recentSummary = history.slice(0,7).map(w => {
          const muscles = [...new Set(w.exercises.map(e=>e.muscle))].join(", ");
          const exNames = w.exercises.map(e => {
            const top = e.sets.filter(s=>s.weight&&s.reps).sort((a,b)=>Number(b.weight)-Number(a.weight))[0];
            return top ? `${e.name} (${top.weight}lb\xd7${top.reps})` : e.name;
          }).join(", ");
          return `${w.date}: ${muscles} \u2014 ${exNames}`;
        }).join("\n");

        const userContext = `IMPORTANT USER CONTEXT:
- Planet Fitness with TWO barbell areas (free barbells available), Smith machines, dumbbells up to 75lb, full cable stations, all standard machines.
- User has RIGHT SIDE DOMINANCE causing a left-side strength imbalance.
- PRIORITIZE unilateral exercises for Back and Chest: Single-Arm Dumbbell Row, Single-Arm Cable Row, Single-Arm Cable Fly, Single-Arm Dumbbell Press.
- For bilateral exercises, tip should say: start with the LEFT side first, then match on the right.
- Regularly include left-side isolation movements to build balance over time.
- Dumbbells max out at 75lb — never recommend more than 75lb for dumbbell exercises.`;

        const prompt = history.length === 0
          ? `User just started at Planet Fitness. Build a beginner full-body workout.\n${userContext}\nAvailable exercises (use ONLY these exact names):\n${exerciseList}\n\nRespond ONLY with JSON:\n{"focus":"Full Body","rationale":"1-2 sentences why","exercises":[{"name":"exact name","muscle":"exact group","sets":3,"reps":"8-12","weight":"suggested starting weight e.g. 45lb or bodyweight","tip":"coaching tip"}]} — include exactly 10 exercises covering multiple muscle groups`
          : `Planet Fitness gym. Recent workouts:\n${recentSummary}\n\nEXERCISE PROGRESSION DATA:\n${progressionSummary}\n\n${userContext}\n\nAvailable exercises (use ONLY these exact names):\n${exerciseList}\n\nUse the progression data to recommend specific weights and sets. Suggest small increases (2.5-5lb) where the user completed all reps cleanly. For new exercises suggest a conservative starting weight.\n\nRespond ONLY with JSON:\n{"focus":"e.g. Push Day","rationale":"1-2 sentences why","exercises":[{"name":"exact name","muscle":"exact group","sets":3,"reps":"8-12","weight":"e.g. 135lb or bodyweight","tip":"mention target weight and progression rationale"}]} — include exactly 10 exercises`;

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", headers: apiHeaders(),
            body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2048,messages:[{role:"user",content:prompt}]})
          });
          const data = await res.json();
          if (data.error) {
            setAiPlan({focus:"API Error", rationale: data.error.message || "API returned an error. Check your key.", exercises:[]});
            setAiLoading(false); return;
          }
          const rawText = data.content?.map(b=>b.text||"").join("") || "";
          // Try to extract JSON even if wrapped in markdown or extra text
          const jsonMatch = rawText.match(/\{[\s\S]*\}/);
          if (!jsonMatch) {
            setAiPlan({focus:"Parse Error", rationale:"Could not read AI response. Try again.", exercises:[], _raw: rawText.slice(0,200)});
            setAiLoading(false); return;
          }
          const parsed = JSON.parse(jsonMatch[0]);
          // Ensure exercises is always an array
          if (!Array.isArray(parsed.exercises)) parsed.exercises = [];
          // Filter out any exercises missing name or muscle
          parsed.exercises = parsed.exercises.filter(e => e.name && e.muscle);
          setAiPlan(parsed);
        } catch(err) {
          setAiPlan({focus:"Error", rationale:`Something went wrong: ${err.message}. Please try again.`, exercises:[]});
        }
        setAiLoading(false);
      };

      const totalWorkouts = history.length;
      const muscleCount = {};
      history.forEach(w => w.exercises.forEach(e => { muscleCount[e.muscle] = (muscleCount[e.muscle]||0)+1; }));
      const topMuscle = Object.entries(muscleCount).sort((a,b)=>b[1]-a[1])[0]?.[0] || "\u2013";

      return (
        <>
          <style>{css}</style>
          {(!apiKey || showKeyModal) && <ApiKeyModal onSave={handleSaveKey} />}
          <div className="app">
            <div className="header">
              <div className="header-top">
                <div className="logo">IRON LOG</div>
                <div className="logo-sub">Workout Tracker</div>
                <button className="header-key" title="Update API Key" onClick={() => setShowKeyModal(true)}>⚙</button>
              </div>
              <div className="date-badge">{today()}</div>
            </div>

            <div className="nav">
              {[["log","LOG"],["history","HISTORY"],["progress","GAINS"],["ai","AI REC"]].map(([id,label]) => (
                <button key={id} className={`nav-btn ${tab===id?"active":""}`} onClick={() => setTab(id)}>{label}</button>
              ))}
            </div>

            {/* LOG TAB */}
            {tab === "log" && (
              <div className="section">
                {loadedFromAI && exercises.length > 0 && (
                  <div className="ai-badge">🤖 Loaded from AI Rec — tap ⇄ SWAP if a machine is taken</div>
                )}
                {!loadedFromAI && (
                  <>
                    <div className="section-label">Add Exercise</div>
                    <label className="scan-btn" style={{cursor:scanLoading?"not-allowed":"pointer",opacity:scanLoading?0.4:1}}>
                      <input type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoScan} disabled={scanLoading} />
                      📷 <span>SCAN MACHINE</span>
                    </label>
                    {scanLoading && (
                      <div className="scan-loading">
                        <div className="scan-spinner"/>
                        <div className="scan-loading-text">IDENTIFYING EQUIPMENT...</div>
                      </div>
                    )}
                    {scanResult && !scanLoading && (
                      <div className="scan-result">
                        <div className="scan-result-icon">{scanResult.identified ? "✅" : "❓"}</div>
                        <div className="scan-result-body">
                          {scanResult.identified ? (
                            <>
                              <div className="scan-result-label">Identified</div>
                              <div className="scan-result-text">{scanResult.identified} → {scanResult.exercise}</div>
                              <div className="scan-result-sub">{scanResult.note}</div>
                            </>
                          ) : (
                            <>
                              <div className="scan-result-label">Not Recognized</div>
                              <div className="scan-result-text" style={{color:"var(--muted)"}}>{scanResult.note}</div>
                            </>
                          )}
                        </div>
                        <button className="scan-dismiss" onClick={() => setScanResult(null)}>×</button>
                      </div>
                    )}
                    <div className="row" style={{marginBottom:8}}>
                      <select className="input" value={selectedMuscle} onChange={e => {
                        setSelectedMuscle(e.target.value);
                        setSelectedExercise(EXERCISE_LIBRARY[e.target.value][0]);
                        setScanResult(null);
                      }}>
                        {MUSCLE_GROUPS.map(m => <option key={m}>{m}</option>)}
                      </select>
                    </div>
                    <div className="row" style={{marginBottom:12}}>
                      <select className="input" value={selectedExercise} onChange={e => { setSelectedExercise(e.target.value); setScanResult(null); }}>
                        {EXERCISE_LIBRARY[selectedMuscle].map(ex => <option key={ex}>{ex}</option>)}
                      </select>
                      <button className="btn btn-accent" onClick={addExercise}>ADD</button>
                    </div>
                  </>
                )}
                {exercises.length > 0 && (
                  <>
                    {!loadedFromAI && <hr className="divider"/>}
                    <div className="section-label">{loadedFromAI ? "Today's Plan" : "Today's Session"}</div>
                    {exercises.map(ex => (
                      <ExerciseCard key={ex.id} exercise={ex}
                        onChange={u => updateExercise(ex.id, u)}
                        onRemove={() => removeExercise(ex.id)}
                        allowSwap={loadedFromAI} />
                    ))}
                    {loadedFromAI && (
                      <button className="btn btn-ghost" style={{width:"100%",marginBottom:10}}
                        onClick={() => setLoadedFromAI(false)}>
                        + Add another exercise manually
                      </button>
                    )}
                    <div style={{marginBottom:10}}>
                      <textarea className="note-input" rows={2} placeholder="Session notes (optional)..."
                        value={note} onChange={e => setNote(e.target.value)} />
                    </div>
                    <button className="btn btn-accent" style={{width:"100%",padding:14}} onClick={saveWorkout}>
                      SAVE WORKOUT
                    </button>
                  </>
                )}
                {exercises.length === 0 && !scanLoading && !scanResult && (
                  <div className="empty-state">
                    <span className="empty-icon">🏋️</span>
                    Snap a photo to auto-fill, select manually above,<br/>
                    or get an AI plan from the AI REC tab.
                  </div>
                )}
              </div>
            )}

            {/* HISTORY TAB */}
            {tab === "history" && (
              <div className="section">
                <div className="stat-row">
                  <div className="stat-box"><div className="stat-val">{totalWorkouts}</div><div className="stat-lbl">Workouts</div></div>
                  <div className="stat-box"><div className="stat-val">{Object.keys(muscleCount).length}</div><div className="stat-lbl">Muscles</div></div>
                  <div className="stat-box"><div className="stat-val" style={{fontSize:16,paddingTop:6}}>{topMuscle}</div><div className="stat-lbl">Top Focus</div></div>
                </div>
                {history.length === 0
                  ? <div className="empty-state"><span className="empty-icon">📋</span>No workouts logged yet.<br/>Head to LOG to start.</div>
                  : history.map(entry => <HistoryItem key={entry.id} entry={entry}/>)
                }
              </div>
            )}

            {/* GAINS TAB */}
            {tab === "progress" && <ProgressTab history={history}/>}

            {/* AI TAB */}
            {tab === "ai" && (
              <div className="section">
                <div className="section-label">AI Recommendation</div>
                <button className="btn btn-accent" style={{width:"100%",padding:14,marginBottom:16}}
                  onClick={getAiRecommendation} disabled={aiLoading}>
                  {aiLoading ? "ANALYZING..." : "BUILD MY NEXT WORKOUT"}
                </button>
                {aiLoading && (
                  <div className="ai-panel">
                    <div className="ai-label"><div className="ai-dot"/> ANALYZING YOUR HISTORY</div>
                    <div className="ai-skeleton">
                      {[80,100,60,90,70,85].map((w,i) => (
                        <div key={i} className="skeleton-line" style={{width:`${w}%`,animationDelay:`${i*0.1}s`}}/>
                      ))}
                    </div>
                  </div>
                )}
                {aiPlan && !aiLoading && (
                  <>
                    <div className="ai-panel">
                      <div className="ai-label"><div className="ai-dot"/> PLAN READY</div>
                      <div className="plan-focus">{aiPlan.focus}</div>
                      <div style={{fontFamily:"IBM Plex Sans",fontSize:13,color:"var(--muted)",lineHeight:1.5}}>{aiPlan.rationale}</div>
                    </div>
                    {aiPlan.exercises?.length === 0 && (
                      <div style={{fontFamily:"IBM Plex Mono",fontSize:11,color:"var(--danger)",padding:"12px 0"}}>
                        No exercises returned. Try tapping BUILD MY NEXT WORKOUT again.
                        {aiPlan._raw && <div style={{marginTop:8,color:"var(--muted)",fontSize:10,wordBreak:"break-all"}}>Raw: {aiPlan._raw}</div>}
                      </div>
                    )}
                    {(aiPlan.exercises||[]).map((ex,i) => (
                      <div key={i} className="plan-exercise">
                        <div className="plan-ex-header">
                          <div>
                            <div className="plan-ex-name">{ex.name}</div>
                            <div className="plan-ex-muscle">{ex.muscle}</div>
                          </div>
                          <div className="plan-ex-detail">{ex.sets} × {ex.reps}{ex.weight ? ` @ ${ex.weight}` : ""}</div>
                        </div>
                        {ex.tip && <div className="plan-rationale">{ex.tip}</div>}
                      </div>
                    ))}
                    {aiPlan.exercises?.length > 0 && (
                      <button className="load-workout-btn" onClick={loadPlanIntoLog}>START THIS WORKOUT →</button>
                    )}
                  </>
                )}
                {!aiPlan && !aiLoading && (
                  <div className="empty-state">
                    <span className="empty-icon">🤖</span>
                    Claude will analyze your history and build<br/>a Planet Fitness-friendly workout plan.
                  </div>
                )}
              </div>
            )}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GymTracker/>);
  </script>
</body>
</html>
